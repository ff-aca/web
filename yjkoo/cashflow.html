<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상헌 연정 부쟈되쟈</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;font-size:14px}
.wrap{max-width:980px;margin:0 auto;padding:24px 16px}
.page-title{font-size:22px;font-weight:500;margin-bottom:4px}
.page-sub{font-size:13px;color:#888780;margin-bottom:20px}
.tabs{display:flex;border-bottom:1px solid rgba(0,0,0,0.1);margin-bottom:24px}
.tab-btn{padding:10px 20px;font-size:14px;border:none;background:transparent;cursor:pointer;color:#888780;border-bottom:2px solid transparent;margin-bottom:-1px;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.tab-btn.on{color:#1a1a18;font-weight:500;border-bottom-color:#1a1a18}
.tab-btn:hover{color:#1a1a18;background:transparent}
.tab-pane{display:none}.tab-pane.on{display:block}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:16px 20px;margin-bottom:16px}
.card-title{font-size:12px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.two-col{grid-template-columns:1fr}}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.metric{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:12px 14px}
.metric-label{font-size:11px;color:#888780;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.metric-val{font-size:19px;font-weight:500;color:#1a1a18}
.metric-val.pos{color:#1D9E75}.metric-val.neg{color:#E24B4A}
.field-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.field-row label{font-size:13px;color:#888780;width:150px;flex-shrink:0}
.field-row .fval{font-size:13px;font-weight:500;min-width:76px;text-align:right;color:#1a1a18}
.field-row input[type=text],.field-row select,.field-row input.num-input{flex:1;font-size:13px;padding:5px 8px;border:0.5px solid rgba(0,0,0,0.15);border-radius:6px;background:#fff;color:#1a1a18;}
.field-row input.num-input{text-align:right}
.field-row input:focus,.field-row select:focus{outline:none;border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,0.12)}
.sec-divider{height:0.5px;background:rgba(0,0,0,0.07);margin:14px 0}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;line-height:1.5;margin-top:8px}
.alert.ok{background:#EAF3DE;color:#3B6D11}
.alert.ng{background:#FCEBEB;color:#A32D2D}
button{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;font-size:13px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:transparent;cursor:pointer;color:#1a1a18;transition:background .15s}
button:hover{background:rgba(0,0,0,0.05)}
button:active{transform:scale(.98)}
button.primary{background:#1a1a18;color:#fff;border-color:#1a1a18}
button.primary:hover{background:#333}
button.danger{color:#A32D2D;border-color:rgba(162,45,45,0.3)}
button.danger:hover{background:#FCEBEB}
button.small{padding:4px 8px;font-size:12px}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;font-size:12px;border:0.5px solid rgba(0,0,0,0.15);border-radius:20px;cursor:pointer;background:transparent;color:#888780;line-height:1.4}
.filter-btn.on{background:#1a1a18;color:#fff;border-color:#1a1a18}
.regen-banner{background:#EAF3DE;border:0.5px solid #9FCE7A;border-radius:8px;padding:9px 14px;font-size:13px;color:#2D5A0E;display:flex;align-items:center;gap:10px;margin-bottom:12px}
.regen-banner.hidden{display:none}
.table-wrap{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;overflow:hidden;margin-bottom:16px}
table.flow{width:100%;border-collapse:collapse;table-layout:fixed}
col.c-drag{width:26px}col.c-date{width:64px}col.c-cat{width:86px}col.c-desc{width:auto}col.c-in{width:106px}col.c-out{width:106px}col.c-bal{width:100px}col.c-act{width:52px}
table.flow thead tr{background:#f8f8f6}
table.flow th{font-size:11px;font-weight:500;color:#888780;text-align:left;padding:8px 10px;border-bottom:0.5px solid rgba(0,0,0,0.08);text-transform:uppercase;letter-spacing:.04em}
table.flow th.r,table.flow td.r{text-align:right}
table.flow td{padding:5px 8px;border-bottom:0.5px solid rgba(0,0,0,0.06);vertical-align:middle}
table.flow tr:last-child td{border-bottom:none}
tr.neg-row{background:#fff8f8}
tr.drag-over{background:#E6F1FB}
tr.dragging{opacity:.4}
table.flow td input[type=text],table.flow td select{width:100%;font-size:13px;padding:3px 5px;border:0.5px solid transparent;border-radius:5px;background:transparent;color:#1a1a18;transition:border-color .15s,background .15s}
table.flow td input.num-input{width:100%;font-size:13px;padding:3px 5px;text-align:right;border:0.5px solid transparent;border-radius:5px;background:transparent;color:#1a1a18;transition:border-color .15s,background .15s}
table.flow td input[type=text]:hover,table.flow td input.num-input:hover,table.flow td select:hover{border-color:rgba(0,0,0,0.2);background:#fafaf8}
table.flow td input:focus,table.flow td select:focus{outline:none;border-color:#378ADD;background:#fff;box-shadow:0 0 0 3px rgba(55,138,221,0.15)}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;white-space:nowrap}
.tag-수자인{background:#E1F5EE;color:#085041}
.tag-신미주{background:#E6F1FB;color:#0C447C}
.tag-인테리어{background:#FAEEDA;color:#633806}
.tag-기타{background:#F1EFE8;color:#444441}
.drag-handle{cursor:grab;color:#ccc;font-size:16px;padding:0 2px;user-select:none}
.drag-handle:active{cursor:grabbing}
.bal-pos{color:#1D9E75;font-weight:500}.bal-neg{color:#E24B4A;font-weight:500}
.add-row-area{padding:10px 12px;border-top:0.5px solid rgba(0,0,0,0.06);background:#fafaf8;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.add-row-area input,.add-row-area select{padding:5px 8px;font-size:13px;border:0.5px solid rgba(0,0,0,0.15);border-radius:6px;background:#fff;color:#1a1a18}
.add-row-area input.num-input{text-align:right}
.add-row-area input:focus,.add-row-area select:focus{outline:none;border-color:#378ADD}
.add-row-area input[name=date]{width:64px}
.add-row-area select[name=cat]{width:96px}
.add-row-area input[name=desc]{flex:1;min-width:100px}
.add-row-area input[name=in],.add-row-area input[name=out]{width:100px}
.chart-wrap{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:16px;margin-bottom:16px}
.chart-title{font-size:13px;font-weight:500;color:#888780;margin-bottom:12px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:20px;width:340px;border:0.5px solid rgba(0,0,0,0.1)}
.modal h3{font-size:15px;font-weight:500;margin-bottom:8px}
.modal p{font-size:13px;color:#888780;margin-bottom:16px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.int-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
.int-table td{padding:5px 6px;border-bottom:0.5px solid rgba(0,0,0,0.05);color:#444}
.int-table tr:last-child td{border-bottom:none}
.int-table td:last-child{text-align:right;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="page-title">🏠 상헌 연정 부쟈되기 프로젝트 🚚</h1>
  <p class="page-sub">양주에서 동탄으로 · 대출 계산 · 현금 흐름 통합 관리</p>

  <div class="tabs">
    <button class="tab-btn on" onclick="showTab('loan')"><i class="ti ti-calculator"></i> 대출 계산기</button>
    <button class="tab-btn" onclick="showTab('flow')"><i class="ti ti-list"></i> 현금 흐름</button>
  </div>

  <!-- ══════ TAB 1: 대출 계산기 ══════ -->
  <div id="tab-loan" class="tab-pane on">
    <div id="calc-metrics" class="metric-grid"></div>
    <div class="two-col">
      <div class="card">
        <div class="card-title"><i class="ti ti-building"></i> 한양수자인 매도</div>
        <div class="field-row"><label>재판매가격</label><input class="num-input" id="c_sell" value="350,000,000" data-raw="350000000" oninput="onNumInput(this,calcLoan)"></div>
        <div class="field-row"><label>주담대 잔액</label><input class="num-input" id="c_loan_bal" value="182,000,000" data-raw="182000000" oninput="onNumInput(this,calcLoan)"></div>
        <div class="field-row"><label>중개보수(VAT+)</label><input class="num-input" id="c_agent_sell" value="1,200,000" data-raw="1200000" oninput="onNumInput(this,calcLoan)"></div>
        <div class="sec-divider"></div>
        <div class="field-row"><label>보유현금</label><input class="num-input" id="c_savings" value="52,000,000" data-raw="52000000" oninput="onNumInput(this,calcLoan)"></div>
        <div class="field-row"><label>월 저축액</label><input class="num-input" id="c_monthly" value="4,000,000" data-raw="4000000" oninput="onNumInput(this,calcLoan)"></div>
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-home-heart"></i> 신미주 매입</div>
        <div class="field-row"><label>매입가</label><input class="num-input" id="c_buy" value="598,000,000" data-raw="598000000" oninput="onNumInput(this,calcLoan)"></div>
        <div class="field-row"><label>대출 유형</label>
          <select id="c_loan_type" onchange="calcLoan()">
            <option value="general">일반주담대 (5.50%, 70%/6억)</option>
            <option value="didimdol">신생아 디딤돌 (2.90%, 70%/4억/방공제4800만)</option>
          </select>
        </div>
        <div class="field-row"><label>금리 직접입력(%)</label><input type="text" id="c_rate_custom" placeholder="비우면 유형 기준" oninput="calcLoan()"></div>
        <div class="field-row"><label>대출 기간</label>
          <select id="c_years" onchange="calcLoan()">
            <option value="30" selected>30년</option><option value="20">20년</option><option value="10">10년</option>
          </select>
        </div>
        <div class="sec-divider"></div>
        <div class="field-row"><label>취득세</label><input class="num-input" id="c_acq_tax" value="6,578,000" data-raw="6578000" oninput="onNumInput(this,calcLoan)"></div>
        <div class="field-row"><label>중개보수(VAT+)</label><input class="num-input" id="c_agent_buy" value="2,631,200" data-raw="2631200" oninput="onNumInput(this,calcLoan)"></div>
        <div class="field-row"><label>이사비용</label><input class="num-input" id="c_move" value="3,000,000" data-raw="3000000" oninput="onNumInput(this,calcLoan)"></div>
        <div class="field-row"><label>인지세·채권 등</label><input class="num-input" id="c_stamp" value="1,000,000" data-raw="1000000" oninput="onNumInput(this,calcLoan)"></div>
        <div class="field-row"><label>인테리어</label><input class="num-input" id="c_interior" value="50,000,000" data-raw="50000000" oninput="onNumInput(this,calcLoan)"></div>
      </div>
    </div>
    <div id="calc-alert"></div>

    <!-- 신용대출 계산기 -->
    <div class="card" style="margin-top:4px">
      <div class="card-title"><i class="ti ti-credit-card"></i> 신용대출 계산기</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
        <div class="field-row" style="flex-direction:column;align-items:flex-start;gap:4px">
          <label style="width:auto">대출금액</label>
          <input class="num-input" id="cr_amt" value="50,000,000" data-raw="50000000" oninput="onNumInput(this,calcCredit)" style="flex:none;width:100%">
        </div>
        <div class="field-row" style="flex-direction:column;align-items:flex-start;gap:4px">
          <label style="width:auto">금리 (%)</label>
          <input type="text" id="cr_rate" value="7.0" oninput="calcCredit()" style="flex:none;width:100%">
        </div>
        <div class="field-row" style="flex-direction:column;align-items:flex-start;gap:4px">
          <label style="width:auto">원리금 상환 기간</label>
          <select id="cr_years" onchange="calcCredit()" style="flex:none;width:100%">
            <option value="5" selected>5년</option><option value="3">3년</option><option value="7">7년</option><option value="10">10년</option>
          </select>
        </div>
      </div>
      <div id="credit-result" style="display:grid;grid-template-columns:1fr 1fr;gap:12px"></div>
    </div>
  </div>

  <!-- ══════ TAB 2: 현금 흐름 ══════ -->
  <div id="tab-flow" class="tab-pane">
    <!-- 계획 입력 패널 -->
    <div class="card">
      <div class="card-title" style="cursor:pointer;user-select:none" onclick="togglePlanPanel()">
        <i class="ti ti-calendar"></i> 잔금·중도금 계획 입력
        <span style="margin-left:auto;font-size:12px;color:#aaa" id="plan-toggle-hint">▼ 펼치기</span>
      </div>
      <div id="plan-panel" style="display:none">
        <div class="two-col">
          <div>
            <div style="font-size:12px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">🏢 한양수자인 매도</div>
            <div class="field-row"><label>매도가</label><input class="num-input" id="p_sell" value="350,000,000" data-raw="350000000" oninput="onNumInput(this,markPlanDirty)"></div>
            <div class="field-row"><label>계약일 · 계약금</label>
              <input type="text" id="p_sell_cd" value="6/7" oninput="markPlanDirty()" style="width:60px;flex:none">
              <input class="num-input" id="p_sell_dep" value="35,000,000" data-raw="35000000" oninput="onNumInput(this,markPlanDirty)" style="flex:1">
            </div>
            <div class="field-row"><label>잔금일</label><input type="text" id="p_sell_bd" value="8/28" oninput="markPlanDirty()"></div>
            <div class="field-row"><label>기존 주담대 잔액</label><input class="num-input" id="p_loan_bal" value="182,000,000" data-raw="182000000" oninput="onNumInput(this,markPlanDirty)"></div>
            <div class="field-row"><label>중개보수</label><input class="num-input" id="p_agent_sell" value="1,200,000" data-raw="1200000" oninput="onNumInput(this,markPlanDirty)"></div>
          </div>
          <div>
            <div style="font-size:12px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">🏡 신미주 매입</div>
            <div class="field-row"><label>매입가</label><input class="num-input" id="p_buy" value="598,000,000" data-raw="598000000" oninput="onNumInput(this,markPlanDirty)"></div>
            <div class="field-row"><label>계약일 · 계약금</label>
              <input type="text" id="p_buy_cd" value="6/9" oninput="markPlanDirty()" style="width:60px;flex:none">
              <input class="num-input" id="p_buy_dep" value="60,000,000" data-raw="60000000" oninput="onNumInput(this,markPlanDirty)" style="flex:1">
            </div>
            <div class="field-row"><label>중도금일 · 중도금</label>
              <input type="text" id="p_buy_md" value="6/30" oninput="markPlanDirty()" style="width:60px;flex:none">
              <input class="num-input" id="p_buy_mid" value="10,000,000" data-raw="10000000" oninput="onNumInput(this,markPlanDirty)" style="flex:1">
            </div>
            <div class="field-row"><label>잔금일</label><input type="text" id="p_buy_bd" value="8/28" oninput="markPlanDirty()"></div>
            <div class="field-row"><label>주담대 예정액</label><input class="num-input" id="p_new_loan" value="418,600,000" data-raw="418600000" oninput="onNumInput(this,markPlanDirty)"></div>
            <div class="field-row"><label>중개보수</label><input class="num-input" id="p_agent_buy" value="2,631,200" data-raw="2631200" oninput="onNumInput(this,markPlanDirty)"></div>
          </div>
        </div>
        <div class="sec-divider"></div>

        <!-- 인테리어 A/B 선택 -->
        <div style="display:flex;gap:16px;margin-bottom:12px">
          <label style="font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px">
            <input type="radio" name="interior_plan" value="a" checked onchange="markPlanDirty()"> A안 사용
          </label>
          <label style="font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px">
            <input type="radio" name="interior_plan" value="b" onchange="markPlanDirty()"> B안 사용
          </label>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div>
            <div style="font-size:12px;font-weight:600;color:#2D5A0E;background:#EAF3DE;padding:5px 10px;border-radius:6px;margin-bottom:10px">🔨 인테리어 A안 (10·30·50·10%)</div>
            <div class="field-row"><label>총 비용</label><input class="num-input" id="p_interior" value="30,000,000" data-raw="30000000" oninput="onNumInput(this,markPlanDirty)"></div>
            <div class="field-row"><label>계약금일</label><input type="text" id="p_int_cd" value="6/20" oninput="markPlanDirty()"></div>
            <div class="field-row"><label>착수금일</label><input type="text" id="p_int_sd" value="7/20" oninput="markPlanDirty()"></div>
            <div class="field-row"><label>중도금일</label><input type="text" id="p_int_md" value="8/10" oninput="markPlanDirty()"></div>
            <div class="field-row"><label>잔금일</label><input type="text" id="p_int_bd" value="8/25" oninput="markPlanDirty()"></div>
            <div id="interior-summary" style="margin-top:10px"></div>
          </div>
          <div>
            <div style="font-size:12px;font-weight:600;color:#0C447C;background:#E6F1FB;padding:5px 10px;border-radius:6px;margin-bottom:10px">🔨 인테리어 B안 (계약금 30% · 잔금 70%)</div>
            <div class="field-row"><label>총 비용</label><input class="num-input" id="pb_interior" value="30,000,000" data-raw="30000000" oninput="onNumInput(this,markPlanDirty)"></div>
            <div class="field-row"><label>계약금일</label><input type="text" id="pb_int_cd" value="6/20" oninput="markPlanDirty()"></div>
            <div class="field-row"><label>잔금일</label><input type="text" id="pb_int_bd" value="8/25" oninput="markPlanDirty()"></div>
            <div id="interior-b-summary" style="margin-top:10px"></div>
          </div>
        </div>
        <div class="sec-divider"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div>
            <div style="font-size:12px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">💰 기타</div>
            <div class="field-row"><label>보유현금</label><input class="num-input" id="p_savings" value="52,000,000" data-raw="52000000" oninput="onNumInput(this,markPlanDirty)"></div>
            <div class="field-row"><label>월 저축 (입금)</label><input class="num-input" id="p_monthly" value="4,000,000" data-raw="4000000" oninput="onNumInput(this,markPlanDirty)"></div>
          </div>
          <div>
            <div style="font-size:12px;font-weight:600;color:#633806;background:#FAEEDA;padding:5px 10px;border-radius:6px;margin-bottom:10px">💳 신용대출 (선택)</div>
            <div class="field-row">
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;width:auto">
                <input type="checkbox" id="p_credit_on" onchange="markPlanDirty()" style="width:14px;height:14px"> 신용대출 포함
              </label>
            </div>
            <div class="field-row"><label>실행일</label><input type="text" id="p_credit_date" value="7/15" oninput="markPlanDirty()"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
function el(id){return document.getElementById(id);}
function gn(id){const i=el(id);if(!i)return 0;return parseInt((i.dataset.raw)||i.value.replace(/,/g,''))||0;}
function fmtM(n){const a=Math.abs(Math.round(n));if(a>=100000000)return(n<0?'-':'')+(a/100000000).toFixed(1).replace(/\.0$/,'')+'억';return(n<0?'-':'')+Math.round(a/10000).toLocaleString()+'만';}
function fmtW(n){return Math.round(n).toLocaleString('ko-KR');}

/* 쉼표 포맷 */
function onNumInput(inp,cb){
  const raw=inp.value.replace(/[^0-9]/g,'');
  const fmt=raw===''?'':parseInt(raw,10).toLocaleString('ko-KR');
  const cf=inp.value.length-inp.selectionStart;
  inp.value=fmt; inp.dataset.raw=raw||'0';
  try{inp.setSelectionRange(Math.max(0,fmt.length-cf),Math.max(0,fmt.length-cf));}catch(e){}
  if(cb) cb();
}
document.addEventListener('blur',e=>{
  if(e.target.classList.contains('num-input')){
    const r=e.target.dataset.raw||'0';
    e.target.value=(r==='0'||r==='')?'':parseInt(r).toLocaleString('ko-KR');
  }
},true);

/* TABS */
function showTab(name){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('on',['loan','flow'][i]===name));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('on'));
  el('tab-'+name).classList.add('on');
  if(name==='flow') renderFlow();
}

/* ── 대출 계산기 ── */
function getLoanParams(){
  const type=el('c_loan_type').value;
  const buy=gn('c_buy');
  const yrs=parseInt(el('c_years').value)||30;
  const customRate=parseFloat(el('c_rate_custom').value);
  let rate,maxAmt;
  if(type==='general'){rate=(isNaN(customRate)?5.50:customRate)/100;maxAmt=Math.min(buy*0.7,600000000);}
  else{rate=(isNaN(customRate)?2.90:customRate)/100;maxAmt=Math.min(buy*0.7-48000000,400000000);}
  const loanAmt=Math.round(Math.max(0,maxAmt)/10000)*10000;
  const mr=rate/12,n=yrs*12;
  const monthly=loanAmt>0?(loanAmt*(mr*Math.pow(1+mr,n))/(Math.pow(1+mr,n)-1)):0;
  return{rate,loanAmt,monthly:Math.round(monthly)};
}
function calcLoan(){
  const sell=gn('c_sell'),loanBal=gn('c_loan_bal'),agentSell=gn('c_agent_sell');
  const buy=gn('c_buy'),acqTax=gn('c_acq_tax'),agentBuy=gn('c_agent_buy');
  const moveCost=gn('c_move'),stamp=gn('c_stamp'),savings=gn('c_savings'),interior=gn('c_interior');
  const{rate,loanAmt,monthly}=getLoanParams();
  const netSell=sell-loanBal-agentSell;
  const cashNeeded=buy-loanAmt+acqTax+agentBuy+moveCost+stamp+interior;
  const remaining=savings+netSell-cashNeeded;
  const profit=sell-285544000;
  el('calc-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">매도 순수령액</div><div class="metric-val">${fmtM(netSell)}</div></div>
    <div class="metric"><div class="metric-label">대출금액</div><div class="metric-val">${fmtM(loanAmt)}</div></div>
    <div class="metric"><div class="metric-label">월 원리금</div><div class="metric-val">${fmtW(monthly)}원</div></div>
    <div class="metric"><div class="metric-label">최소 필요현금</div><div class="metric-val">${fmtM(cashNeeded)}</div></div>
    <div class="metric"><div class="metric-label">최종 남는 현금</div><div class="metric-val ${remaining>=0?'pos':'neg'}">${fmtM(remaining)}</div></div>
    <div class="metric"><div class="metric-label">수자인 실현이득</div><div class="metric-val pos">${fmtM(profit)}</div></div>`;
  el('calc-alert').innerHTML=`<div class="alert ${remaining>=0?'ok':'ng'}">
    <strong>${remaining>=0?'✓ 가능':'✗ 현금 부족'}</strong> — 필요현금 대비 <strong>${fmtM(Math.abs(remaining))}</strong> ${remaining>=0?'여유':'부족'}.
    금리 <strong>${(rate*100).toFixed(2)}%</strong> · 월 원리금 <strong>${fmtW(monthly)}원</strong></div>`;
}

/* ── 신용대출 계산기 ── */
function calcCredit(){
  const amt=gn('cr_amt');
  const rate=(parseFloat(el('cr_rate').value)||7.0)/100;
  const yrs=parseInt(el('cr_years').value)||5;
  const mr=rate/12,n=yrs*12;
  const monthlyInt=Math.round(amt*mr);
  const totalInt=monthlyInt*n;
  const monthlyPrin=Math.round(amt*(mr*Math.pow(1+mr,n))/(Math.pow(1+mr,n)-1));
  const totalPrin=monthlyPrin*n-amt;
  el('credit-result').innerHTML=`
    <div style="background:#FAEEDA;border-radius:10px;padding:14px 16px">
      <div style="font-size:12px;font-weight:600;color:#633806;margin-bottom:10px">⏰ 만기일시상환</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#888780">월 이자</span><strong style="color:#E24B4A">${fmtW(monthlyInt)}원</strong></div>
        <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#888780">만기 원금 일시상환</span><strong>${fmtM(amt)}</strong></div>
        <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#888780">총 이자 부담</span><strong style="color:#E24B4A">${fmtW(totalInt)}원</strong></div>
      </div>
    </div>
    <div style="background:#F1EFE8;border-radius:10px;padding:14px 16px">
      <div style="font-size:12px;font-weight:600;color:#444;margin-bottom:10px">📅 원리금균등상환 (${yrs}년)</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#888780">월 원리금</span><strong style="color:#E24B4A">${fmtW(monthlyPrin)}원</strong></div>
        <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#888780">총 상환 기간</span><strong>${yrs}년 (${n}회)</strong></div>
        <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#888780">총 이자 부담</span><strong style="color:#E24B4A">${fmtW(totalPrin)}원</strong></div>
      </div>
    </div>
    <div style="grid-column:1/-1;font-size:12px;color:#888780;background:#f8f8f6;border-radius:6px;padding:8px 12px">
      💡 금리 <strong>${(rate*100).toFixed(1)}%</strong> · 만기일시상환은 월 이자만 내다가 만기에 원금 전액 상환, 원리금균등은 매달 원금+이자를 ${yrs}년간 분할 상환
    </div>`;
}

/* ── 계획 패널 ── */
let planPanelOpen=false;
function togglePlanPanel(){
  planPanelOpen=!planPanelOpen;
  el('plan-panel').style.display=planPanelOpen?'block':'none';
  el('plan-toggle-hint').textContent=planPanelOpen?'▲ 접기':'▼ 펼치기';
  if(planPanelOpen) updateInteriorSummary();
}
function markPlanDirty(){
  updateInteriorSummary();
  el('regen-banner').classList.remove('hidden');
}
function updateInteriorSummary(){
  const v=gn('p_interior');
  el('interior-summary').innerHTML=`<table class="int-table">
    <tr><td>계약금 (10%)</td><td>${fmtM(v*0.)}</td></tr>
    <tr><td>착수금 (20%)</td><td>${fmtM(v*0.2)}</td></tr>
    <tr><td>중도금 (50%)</td><td>${fmtM(v*0.5)}</td></tr>
    <tr><td>잔금 (20%)</td><td>${fmtM(v*0.2)}</td></tr>
  </table>`;
  const vb=gn('pb_interior');
  el('interior-b-summary').innerHTML=`<table class="int-table">
    <tr><td>계약금 (30%)</td><td>${fmtM(vb*0.3)}</td></tr>
    <tr><td>잔금 (70%)</td><td>${fmtM(vb*0.7)}</td></tr>
  </table>`;
}

/* ── buildPlanRows ── */
function buildPlanRows(){
  const sell=gn('p_sell'), dep=gn('p_sell_dep'), lbal=gn('p_loan_bal'), agSell=gn('p_agent_sell');
  const buy=gn('p_buy'), buyDep=gn('p_buy_dep'), buyMid=gn('p_buy_mid');
  const newLoan=gn('p_new_loan'), agBuy=gn('p_agent_buy');
  const savings=gn('p_savings'), monthly=gn('p_monthly');
  const planB=document.querySelector('input[name=interior_plan]:checked')?.value==='b';
  const intAmt=planB ? gn('pb_interior') : gn('p_interior');
  const creditOn=el('p_credit_on').checked;
  const creditAmt=gn('p_credit_amt');
  const creditDate=el('p_credit_date').value;
  const creditRepayDate=el('p_credit_repay_date').value;
  const creditInterest=Math.round(creditAmt*0.07/12*2);
  const sellBal=sell-dep;
  const buyBal=buy-buyDep-buyMid;
  const taxEtc=Math.round(buy*0.011)+1000000;

  const result=[
    {cat:'기타',    desc:'보유현금 (시작)',          date:'6/4',               inn:savings,  out:0},
    {cat:'수자인',  desc:'수자인 계약금 수령',        date:el('p_sell_cd').value, inn:dep,    out:0},
    {cat:'신미주',  desc:'신미주 계약금 지출',        date:el('p_buy_cd').value,  inn:0,      out:buyDep},
  ];

  /* 인테리어 계약금 — A/B 분기 */
  if(planB){
    result.push({cat:'인테리어', desc:'인테리어 계약금 (30%) — B안', date:el('pb_int_cd').value, inn:0, out:Math.round(intAmt*0.3)});
  } else {
    result.push({cat:'인테리어', desc:'인테리어 계약금 (10%) — A안', date:el('p_int_cd').value,  inn:0, out:Math.round(intAmt*0.1)});
  }

  result.push(
    {cat:'신미주', desc:'신미주 중도금 지출', date:el('p_buy_md').value, inn:0, out:buyMid},
    {cat:'기타',   desc:'6월 월급 저축',      date:'6/30',               inn:monthly, out:0},
  );

  if(creditOn){
    result.push({cat:'기타', desc:'신용대출 실행 💳', date:creditDate, inn:creditAmt, out:0});
  }

  /* 인테리어 중간 납부 — A/B 분기 */
  if(planB){
    result.push(
      {cat:'기타',     desc:'7월 월급 저축',              date:'7/31',               inn:monthly, out:0},
      {cat:'인테리어', desc:'인테리어 잔금 (70%) — B안',  date:el('pb_int_bd').value, inn:0, out:Math.round(intAmt*0.7)},
    );
  } else {
    result.push(
      {cat:'인테리어', desc:'인테리어 착수금 (20%) — A안', date:el('p_int_sd').value, inn:0, out:Math.round(intAmt*0.2)},
      {cat:'기타',     desc:'7월 월급 저축',               date:'7/31',               inn:monthly, out:0},
      {cat:'인테리어', desc:'인테리어 중도금 (50%) — A안', date:el('p_int_md').value, inn:0, out:Math.round(intAmt*0.5)},
      {cat:'인테리어', desc:'인테리어 잔금 (20%) — A안',   date:el('p_int_bd').value, inn:0, out:Math.round(intAmt*0.2)},
    );
  }

  result.push(
    {cat:'기타',   desc:'이사비용',             date:el('p_sell_bd').value, inn:0,       out:3000000},
    {cat:'수자인', desc:'수자인 매도 잔금 수령', date:el('p_sell_bd').value, inn:sellBal, out:0},
    {cat:'수자인', desc:'기존 주담대 상환',      date:el('p_sell_bd').value, inn:0,       out:lbal},
    {cat:'수자인', desc:'수자인 중개보수',        date:el('p_sell_bd').value, inn:0,       out:agSell},
    {cat:'신미주', desc:'신미주 주담대 대출 실행', date:el('p_buy_bd').value, inn:newLoan, out:0},
    {cat:'신미주', desc:'신미주 매입 잔금 지출',  date:el('p_buy_bd').value, inn:0,       out:buyBal},
    {cat:'신미주', desc:'신미주 중개보수',         date:el('p_buy_bd').value, inn:0,       out:agBuy},
    {cat:'기타',   desc:'취득세 등 세금',          date:el('p_buy_bd').value, inn:0,       out:taxEtc},
    {cat:'기타',   desc:'8월 월급 저축',           date:'8/31',               inn:monthly, out:0},
  );

  if(creditOn){
    result.push(
      {cat:'기타', desc:'신용대출 원금 상환 💳',         date:creditRepayDate, inn:0, out:creditAmt},
      {cat:'기타', desc:'신용대출 이자 (7%, 약 2개월)',  date:creditRepayDate, inn:0, out:creditInterest},
    );
  }

  return result.map((r,i)=>({id:i+1,...r}));
}

function applyPlan(){
  rows=buildPlanRows();
  nextId=rows.length+1;
  el('regen-banner').classList.add('hidden');
  renderFlow();
}

/* ── 현금흐름 테이블 ── */
let rows=buildPlanRows();
let nextId=rows.length+1;
let filterCat='전체', deleteTargetId=null, dragSrcId=null, chartInst=null;

function computeBalances(data){let b=0;return data.map(r=>({...r,bal:(b=b+r.inn-r.out)}));}

function refreshBalances(){
  const wb=computeBalances(rows);
  wb.forEach(r=>{
    const tr=el('flow-body').querySelector(`tr[data-id="${r.id}"]`);
    if(!tr) return;
    const balTd=tr.cells[6];
    balTd.textContent=fmtM(r.bal);
    balTd.className='r '+(r.bal>=0?'bal-pos':'bal-neg');
    tr.classList.toggle('neg-row',r.bal<0);
  });
  updateSummaryChart(wb);
}

function updateSummaryChart(wb){
  const final=wb[wb.length-1]?.bal||0;
  const minBal=wb.length?Math.min(...wb.map(x=>x.bal)):0;
  const totalIn=rows.reduce((s,r)=>s+r.inn,0), totalOut=rows.reduce((s,r)=>s+r.out,0);
  el('flow-summary').innerHTML=`
    <div class="metric"><div class="metric-label">최종 잔액</div><div class="metric-val ${final>=0?'pos':'neg'}">${fmtM(final)}</div></div>
    <div class="metric"><div class="metric-label">최저 잔액</div><div class="metric-val ${minBal>=0?'pos':'neg'}">${fmtM(minBal)}</div></div>
    <div class="metric"><div class="metric-label">총 입금</div><div class="metric-val pos">${fmtM(totalIn)}</div></div>
    <div class="metric"><div class="metric-label">총 출금</div><div class="metric-val neg">${fmtM(totalOut)}</div></div>`;
  const labels=wb.map(r=>r.date), data=wb.map(r=>Math.round(r.bal/10000));
  const colors=data.map(v=>v>=0?'#378ADD':'#E24B4A');
  if(chartInst) chartInst.destroy();
  chartInst=new Chart(el('chart'),{
    type:'line',
    data:{labels,datasets:[{label:'잔액(만원)',data,borderColor:'#378ADD',pointBackgroundColor:colors,pointBorderColor:colors,backgroundColor:'rgba(55,138,221,0.08)',borderWidth:2,pointRadius:4,fill:true,tension:0.3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11},maxRotation:45,autoSkip:false}},y:{ticks:{callback:v=>v.toLocaleString()+'만',font:{size:11}}}}}
  });
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderFlow(){
  const wb=computeBalances(rows);
  const filtered=filterCat==='전체'?wb:wb.filter(r=>r.cat===filterCat);
  const tbody=el('flow-body'); tbody.innerHTML='';

  filtered.forEach(r=>{
    const tr=document.createElement('tr');
    tr.dataset.id=r.id; tr.draggable=true;
    if(r.bal<0) tr.classList.add('neg-row');
    tr.innerHTML=`
      <td><span class="drag-handle"><i class="ti ti-grip-vertical"></i></span></td>
      <td><input type="text" value="${r.date}" data-field="date" data-id="${r.id}" style="width:54px"></td>
      <td><select data-field="cat" data-id="${r.id}">${['기타','수자인','신미주','인테리어'].map(c=>`<option${r.cat===c?' selected':''}>${c}</option>`).join('')}</select></td>
      <td><input type="text" value="${escHtml(r.desc)}" data-field="desc" data-id="${r.id}"></td>
      <td><input class="num-input" data-field="inn" data-id="${r.id}" data-raw="${r.inn}" value="${r.inn?r.inn.toLocaleString('ko-KR'):''}" placeholder="0"></td>
      <td><input class="num-input" data-field="out" data-id="${r.id}" data-raw="${r.out}" value="${r.out?r.out.toLocaleString('ko-KR'):''}" placeholder="0"></td>
      <td class="r ${r.bal>=0?'bal-pos':'bal-neg'}">${fmtM(r.bal)}</td>
      <td style="text-align:right"><button class="small danger" onclick="askDelete(${r.id})"><i class="ti ti-trash" style="font-size:13px"></i></button></td>`;

    tr.addEventListener('dragstart',e=>{dragSrcId=r.id;tr.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    tr.addEventListener('dragend',()=>{tr.classList.remove('dragging');document.querySelectorAll('tr.drag-over').forEach(t=>t.classList.remove('drag-over'));});
    tr.addEventListener('dragover',e=>{e.preventDefault();tr.classList.add('drag-over');});
    tr.addEventListener('dragleave',()=>tr.classList.remove('drag-over'));
    tr.addEventListener('drop',e=>{e.preventDefault();tr.classList.remove('drag-over');if(dragSrcId!==r.id)moveRow(dragSrcId,r.id);});
    tbody.appendChild(tr);

    tr.querySelectorAll('input[type=text],select').forEach(inp=>{
      inp.addEventListener('change',()=>{
        const row=rows.find(x=>x.id===r.id); if(!row) return;
        row[inp.dataset.field]=inp.value; renderFlow();
      });
    });
    tr.querySelectorAll('input.num-input').forEach(inp=>{
      inp.addEventListener('input',()=>{
        const raw=inp.value.replace(/[^0-9]/g,'');
        const fmt=raw===''?'':parseInt(raw,10).toLocaleString('ko-KR');
        const sel=inp.selectionStart, oldLen=inp.value.length;
        inp.value=fmt; inp.dataset.raw=raw||'0';
        try{inp.setSelectionRange(Math.max(0,fmt.length-(oldLen-sel)),Math.max(0,fmt.length-(oldLen-sel)));}catch(e){}
        const row=rows.find(x=>x.id===r.id); if(!row) return;
        row[inp.dataset.field]=parseInt(raw||'0',10);
        refreshBalances();
      });
    });
  });
  updateSummaryChart(wb);
}

function moveRow(srcId,targetId){
  const a=rows.findIndex(r=>r.id===srcId),b=rows.findIndex(r=>r.id===targetId);
  if(a<0||b<0) return;
  const[rm]=rows.splice(a,1); rows.splice(b,0,rm); renderFlow();
}
function askDelete(id){
  deleteTargetId=id;
  const r=rows.find(r=>r.id===id);
  el('modal-msg').textContent=`"${r?.desc||''}" 항목을 삭제할까요?`;
  el('modal-bg').classList.add('open');
}
function closeModal(){el('modal-bg').classList.remove('open');deleteTargetId=null;}
function confirmDelete(){rows=rows.filter(r=>r.id!==deleteTargetId);closeModal();renderFlow();}

function addRow(){
  const a=el('add-area');
  rows.push({
    id:nextId++,
    date:a.querySelector('[name=date]').value.trim()||'?',
    cat:a.querySelector('[name=cat]').value,
    desc:a.querySelector('[name=desc]').value.trim()||'새 항목',
    inn:parseInt(a.querySelector('[name=in]').dataset.raw||'0')||0,
    out:parseInt(a.querySelector('[name=out]').dataset.raw||'0')||0
  });
  ['date','desc'].forEach(n=>a.querySelector(`[name=${n}]`).value='');
  ['in','out'].forEach(n=>{const i=a.querySelector(`[name=${n}]`);i.value='';i.dataset.raw='0';});
  renderFlow();
}
el('add-area').querySelectorAll('input.num-input').forEach(inp=>{
  inp.addEventListener('input',()=>{
    const raw=inp.value.replace(/[^0-9]/g,'');
    const fmt=raw===''?'':parseInt(raw,10).toLocaleString('ko-KR');
    const cf=inp.value.length-inp.selectionStart;
    inp.value=fmt; inp.dataset.raw=raw||'0';
    try{inp.setSelectionRange(Math.max(0,fmt.length-cf),Math.max(0,fmt.length-cf));}catch(e){}
  });
});

function exportCSV(){
  const wb=computeBalances(rows);
  const lines=['일자,분류,내용,입금,출금,잔액',...wb.map(r=>`${r.date},${r.cat},"${r.desc}",${r.inn},${r.out},${Math.round(r.bal)}`)];
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8;'}));
  a.download='현금흐름.csv'; a.click();
}

el('filter-bar').addEventListener('click',e=>{
  const b=e.target.closest('.filter-btn'); if(!b) return;
  document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('on')); b.classList.add('on');
  filterCat=b.dataset.cat; renderFlow();
});
el('add-area').querySelector('input[name=desc]').addEventListener('keydown',e=>{if(e.key==='Enter')addRow();});

/* init */
calcLoan();
calcCredit();
renderFlow();
updateInteriorSummary();
</script>
</body>
</html>
